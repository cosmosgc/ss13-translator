<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Playground</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1b26; --surface: #24283b; --border: #3b4261;
  --text: #c0caf5; --dim: #565f89; --accent: #7aa2f7;
  --green: #9ece6a; --yellow: #e0af68; --red: #f7768e;
  --orange: #ff9e64; --purple: #bb9af7;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
#app { display: flex; flex-direction: column; height: 100%; }
#header { display: flex; align-items: center; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; }
#header h1 { font-size: 16px; font-weight: 700; color: var(--accent); }
#header .actions { margin-left: auto; display: flex; gap: 8px; }
.btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; }
.btn:hover { background: var(--border); }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-primary { border-color: var(--accent); color: var(--accent); }

#main { flex: 1; overflow-y: auto; padding: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }

/* Input section */
#input-section { flex: 1; min-width: 400px; max-width: 700px; }
#input-section h2, #output-section h2 { font-size: 12px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-bottom: 12px; }

label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; margin-top: 12px; }
label:first-child { margin-top: 0; }

textarea { width: 100%; min-height: 80px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; resize: vertical; }
textarea:focus { outline: none; border-color: var(--accent); }

.presets { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.presets .btn { font-size: 11px; }

#input-status { margin-top: 12px; font-size: 13px; color: var(--dim); }

/* Output section */
#output-section { flex: 1; min-width: 400px; max-width: 700px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 12px; }
.card h3 { font-size: 12px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-bottom: 8px; }
.card .val { font-size: 13px; line-height: 1.5; word-break: break-word; }
.card .val.success { color: var(--green); }
.card .val.warning { color: var(--orange); }
.card .val.error { color: var(--red); }
.card .val.info { color: var(--accent); }

pre.json { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 12px; line-height: 1.4; overflow-x: auto; max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-family: 'Cascadia Code', 'Fira Code', monospace; }

#llm-status { font-size: 13px; }
.llm-on { color: var(--green); }
.llm-off { color: var(--red); }

/* Spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--dim); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🧪 LLM Playground</h1>
    <span class="actions">
      <span id="llm-status">connecting...</span>
      <button class="btn" id="btn-reasoning" onclick="toggleReasoning()" style="font-size:11px">Reasoning: ON</button>
      <a href="/" class="btn">← Back to Review</a>
    </span>
  </div>
  <div id="main">
    <div id="input-section">
      <h2>Translate</h2>
      <div class="card">
        <label for="text-input">Source text</label>
        <textarea id="text-input" placeholder="Enter English text to translate..."></textarea>

        <label>Presets</label>
        <div class="presets">
          <button class="btn" onclick="setPreset('This station is now under lockdown procedures.')">lockdown</button>
          <button class="btn" onclick="setPreset('You need a higher access level.')">access denied</button>
          <button class="btn" onclick="setPreset('The floor is welded shut.')">welded shut</button>
          <button class="btn" onclick="setPreset('[user] fires the [gun]!')">brackets</button>
          <button class="btn" onclick="setPreset('You try to move \him, but \he resists.')">escapes</button>
          <button class="btn" onclick="setPreset('<span class=\'danger\'>Warning: Plasma levels critical.</span>')">html tags</button>
        </div>

        <div style="margin-top: 12px; display: flex; align-items: center; gap: 12px;">
          <button id="translate-btn" class="btn btn-primary" style="padding: 6px 24px;" onclick="doTranslate()">Translate</button>
          <span id="reasoning-tag" style="font-size:11px; color:var(--dim)">Reasoning mode</span>
        </div>
        <div id="input-status"></div>
      </div>
    </div>

    <div id="output-section">
      <h2>Results</h2>
      <div id="output-area">
        <div class="card">
          <h3>Translation</h3>
          <div id="result-translation" class="val info">—</div>
        </div>
        <div class="card">
          <h3>Safe Check</h3>
          <div id="result-safe" class="val">—</div>
        </div>
        <div class="card">
          <h3>content (raw)</h3>
          <div id="result-content" class="val">—</div>
        </div>
        <div class="card">
          <h3>reasoning_content</h3>
          <div id="result-reasoning" class="val">—</div>
        </div>
        <div class="card">
          <h3>Raw Response</h3>
          <pre id="result-raw" class="json">—</pre>
        </div>
        <div class="card">
          <h3>Error</h3>
          <div id="result-error" class="val">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let translating = false;

async function fetchJSON(url, body) {
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  return r.json();
}

function setPreset(text) {
  document.getElementById('text-input').value = text;
}

function clearResults() {
  document.getElementById('result-translation').textContent = '—';
  document.getElementById('result-translation').className = 'val';
  document.getElementById('result-safe').textContent = '—';
  document.getElementById('result-safe').className = 'val';
  document.getElementById('result-content').textContent = '—';
  document.getElementById('result-content').className = 'val';
  document.getElementById('result-reasoning').textContent = '—';
  document.getElementById('result-reasoning').className = 'val';
  document.getElementById('result-raw').textContent = '—';
  document.getElementById('result-error').textContent = '—';
  document.getElementById('result-error').className = 'val';
}

async function doTranslate() {
  const text = document.getElementById('text-input').value.trim();
  if (!text || translating) return;

  translating = true;
  const btn = document.getElementById('translate-btn');
  btn.disabled = true;
  btn.textContent = 'Translating...';
  document.getElementById('input-status').innerHTML = '<span class="spinner"></span> Sending request...';
  clearResults();

  const start = performance.now();
  const data = await fetchJSON('/api/test-translate', { text });
  const elapsed = ((performance.now() - start) / 1000).toFixed(1);

  if (data.error) {
    document.getElementById('result-error').textContent = `${data.error}${data.detail ? ': ' + data.detail : ''}`;
    document.getElementById('result-error').className = 'val error';
  } else {
    const t = document.getElementById('result-translation');
    t.textContent = data.translation || '(empty)';
    t.className = data.translation ? 'val success' : 'val error';

    const s = document.getElementById('result-safe');
    s.textContent = data.safe ? '✅ Safe (' + data.issues.join(', ') + ')' : '❌ Issues: ' + (data.issues.length ? data.issues.join(', ') : '—');
    s.className = data.safe ? 'val success' : 'val error';

    document.getElementById('result-content').textContent = data.content_raw || '(empty)';
    document.getElementById('result-content').className = data.content_raw ? 'val' : 'val warning';
    document.getElementById('result-reasoning').textContent = data.reasoning_content || '(empty)';
    document.getElementById('result-reasoning').className = data.reasoning_content ? 'val' : 'val dim';
    document.getElementById('result-raw').textContent = JSON.stringify(data.raw_response, null, 2);
    document.getElementById('result-error').textContent = '—';
    document.getElementById('result-error').className = 'val';
  }

  document.getElementById('input-status').textContent = `Done in ${elapsed}s`;
  btn.disabled = false;
  btn.textContent = 'Translate';
  translating = false;
}

document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) doTranslate();
});

(async function() {
  try {
    const r = await fetch('/api/status');
    const s = await r.json();
    const el = document.getElementById('llm-status');
    if (s.llm_connected) {
      el.innerHTML = '<span class="llm-on">● LLM connected</span>';
    } else {
      el.innerHTML = '<span class="llm-off">● LLM unavailable</span>';
    }
    const re = document.getElementById('btn-reasoning');
    re.textContent = s.reasoning_mode ? 'Reasoning: ON' : 'Reasoning: OFF';
  } catch(e) {
    document.getElementById('llm-status').innerHTML = '<span class="llm-off">● Server down</span>';
  }
})();

async function toggleReasoning() {
  const btn = document.getElementById('btn-reasoning');
  const newState = btn.textContent.includes('ON') ? false : true;
  btn.disabled = true;
  try {
    await fetch('/api/toggle-reasoning', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ enabled: newState }),
    });
    btn.textContent = newState ? 'Reasoning: ON' : 'Reasoning: OFF';
  } catch(e) { /* ignore */ }
  btn.disabled = false;
}
</script>
</body>
</html>
